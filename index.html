<style>
:root{
  --ink:#2b2f2c; --ink-soft:#5f6a62; --card:#fff; --radius:26px;
  --sky:#bcd7f2; --peri:#c5cef2; --mint:#c2e7cf; --sage:#d2ead2; --lime-soft:#e7f0a6; --pale:#d6e4f5;
  --lime:#cfe84f; --peri-pop:#5f86d8; --teal:#57c2a0;
  --grad:linear-gradient(120deg,#5f86d8 0%,#57c2a0 52%,#bfe34a 100%);
  --grad-stat:linear-gradient(125deg,#cde84a 0%,#57c2a0 52%,#5f86d8 100%);
  --grad-bar:linear-gradient(90deg,#5f86d8 0%,#57c2a0 52%,#cde84a 100%);
  --shadow:0 24px 60px -24px rgba(70,110,150,.30);
  --shadow-card:0 18px 40px -22px rgba(80,120,150,.26);
}
*{box-sizing:border-box;margin:0;padding:0}
::selection{background:#cde84a;color:#2b2f2c}
html{scroll-behavior:smooth}
body{
  font-family:'NanumBarunGothic','나눔바른고딕','Nanum Gothic','Pretendard',sans-serif;color:var(--ink);background:#eef3ee;
  -webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden;
}
/* 오로라 배경 */
.aura-bg{position:fixed;inset:0;z-index:-1;overflow:hidden;background:#eef3ee}
.aura-bg span{position:absolute;border-radius:50%;filter:blur(70px);opacity:.55}
.aura-bg .a1{width:46vw;height:46vw;background:var(--sky);top:-10vw;left:-8vw}
.aura-bg .a2{width:40vw;height:40vw;background:var(--mint);top:30vh;right:-12vw}
.aura-bg .a3{width:38vw;height:38vw;background:var(--lime-soft);bottom:-10vw;left:20vw}
.aura-bg .a4{width:30vw;height:30vw;background:var(--peri);bottom:18vh;right:14vw}

.app{max-width:760px;margin:0 auto;padding:0 18px 70px}

/* ===== 상단: 진행률 + 탭 ===== */
body.hide-top .topbar{display:none}
.topbar{position:sticky;top:0;z-index:40;background:rgba(238,243,238,.82);backdrop-filter:blur(14px);
  padding:14px 18px 0;margin:0 -18px 26px;border-bottom:1px solid rgba(95,134,216,.12)}
.prog-wrap{max-width:760px;margin:0 auto}
.prog-top{display:flex;justify-content:space-between;align-items:center;font-family:'Space Grotesk';font-size:.78rem;
  font-weight:700;letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase}
.prog-top b{font-size:.95rem;color:var(--peri-pop)}
.prog-track{height:7px;border-radius:999px;background:#edf3d4;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;width:0;border-radius:999px;background:var(--grad-bar);transition:width .4s cubic-bezier(.2,.8,.2,1)}
.tabs{display:flex;gap:4px;max-width:760px;margin:12px auto 0}
.tab{flex:1;text-align:center;padding:13px 6px;cursor:pointer;font-weight:800;font-size:.95rem;
  color:var(--ink-soft);border:none;background:none;position:relative;letter-spacing:-.01em;transition:.2s}
.tab.active{color:var(--ink)}
.tab.active::after{content:"";position:absolute;left:14%;right:14%;bottom:-1px;height:3px;border-radius:3px;background:var(--grad)}
.tab .en{display:block;font-family:'Space Grotesk';font-size:.62rem;letter-spacing:.14em;opacity:.6;text-transform:uppercase}

.panel{display:none;animation:fade .5s ease}
.panel.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:26px;margin-bottom:18px}
.eyebrow{font-family:'Space Grotesk';font-size:.72rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink);display:inline-block;padding:1px 7px;background:linear-gradient(transparent 52%, rgba(205,232,74,.7) 52%)}
.bigtitle{font-family:'Archivo Black','Space Grotesk',sans-serif;font-size:clamp(2rem,7vw,3rem);line-height:1.02;
  letter-spacing:-.02em;margin:14px 0 6px}
.kr-sub{font-family:'NanumBarunGothic','나눔바른고딕','Nanum Gothic','Pretendard',sans-serif;font-weight:800;font-size:1.15rem;color:var(--ink-soft)}
.lead{color:var(--ink-soft);font-size:1rem;margin-top:12px}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
/* 인트로 헤더 카드: 라임 배경 + 흰 글씨 */
.intro-hero{background:linear-gradient(150deg,#d4ec5a 0%,#b3d63c 100%);box-shadow:0 24px 50px -20px rgba(150,190,40,.55)}
.intro-hero .grad-text{background:linear-gradient(125deg,#3f6fd0 0%,#2f9c80 50%,#5c7a12 100%);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}
.intro-hero .kr-sub{color:var(--ink)}
.intro-hero .lead{color:var(--ink)}
.intro-hero .btn-pop{background:#fff;color:var(--ink);box-shadow:0 14px 30px -12px rgba(60,90,20,.4)}
.intro-hero .btn-pop:hover{background:#f3f8e2}
/* 첫 화면(소개)만 라임 형광 가득 */

#panel-intro .card{background:rgba(34,58,46,.34);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1.5px solid rgba(255,255,255,.72);box-shadow:0 22px 50px -26px rgba(12,38,26,.5)}
#panel-intro .cat-chip{background:rgba(34,58,46,.3);border:1.5px solid rgba(255,255,255,.65)}
#panel-intro .cat-chip .en{color:rgba(255,255,255,.92)}
#panel-intro .cat-chip .ko{color:#fff}
#panel-intro .lead{color:#fff;text-shadow:0 1px 9px rgba(12,38,26,.45)}
#panel-intro .areas-title{color:#fff;text-shadow:0 1px 9px rgba(12,38,26,.45)}
#panel-intro .eyebrow{color:#fff;background:none;text-shadow:0 1px 8px rgba(12,38,26,.5)}
#panel-intro .foot-note{color:rgba(255,255,255,.92);text-shadow:0 1px 9px rgba(20,45,65,.55)}
#panel-intro .foot-note .mark{color:#eaff7a}
/* 풀스크린 히어로 (EverSwap 느낌, 라임 톤 유지) */

.hero-screen{position:relative;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 22px 56px}
.hero-eyebrow{font-family:'Space Grotesk';font-size:.74rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.92);font-weight:700;margin-bottom:20px;text-shadow:0 1px 10px rgba(20,45,65,.4)}
.hero-title{font-family:'Archivo Black','Space Grotesk',sans-serif;font-size:clamp(2.3rem,10.5vw,4.6rem);
  line-height:.95;letter-spacing:-.03em}
.hero-title .grad-text{background:none;-webkit-text-fill-color:#fff;color:#fff;text-shadow:0 2px 28px rgba(20,45,65,.55),0 1px 3px rgba(20,45,65,.4)}
.hero-sub{font-family:'NanumBarunGothic','나눔바른고딕','Nanum Gothic','Pretendard',sans-serif;font-weight:800;font-size:1.15rem;color:#fff;margin-top:22px;text-shadow:0 1px 12px rgba(20,45,65,.45)}
.scroll-hint{position:absolute;bottom:14px;left:50%;font-family:'Space Grotesk';font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:#fff;opacity:.9;text-shadow:0 1px 10px rgba(20,45,65,.5);animation:bob 1.9s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,7px)}}
/* 6가지 영역: 작게 */
.areas-title{font-family:'NanumBarunGothic','나눔바른고딕','Nanum Gothic','Pretendard',sans-serif;font-weight:800;font-size:1.05rem;margin:10px 0 12px}
#panel-intro .cat-list{grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.areas-card .cat-chip{padding:10px 12px;gap:9px;border-radius:14px}
.areas-card .cat-dot{width:30px;height:30px;border-radius:9px;font-size:.78rem}
.areas-card .cat-chip .en{font-size:.78rem}
.areas-card .cat-chip .ko{font-size:.84rem}
@media(max-width:560px){
  #panel-intro .cat-chip{flex-direction:column;align-items:center;text-align:center;gap:7px;padding:13px 6px}
  #panel-intro .cat-list{gap:7px}
  .areas-card .cat-chip .en{font-size:.74rem}
  .areas-card .cat-chip .ko{font-size:.8rem;line-height:1.3}
}

/* 버튼 */
.btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;cursor:pointer;border:none;
  font-family:'NanumBarunGothic','나눔바른고딕','Nanum Gothic','Pretendard',sans-serif;font-weight:800;font-size:1.02rem;padding:15px 30px;border-radius:999px;transition:.22s}
.btn-pop{background:var(--lime);color:var(--ink);box-shadow:0 14px 30px -12px rgba(150,190,40,.5)}
.btn-pop:hover{transform:translateY(-2px) scale(1.02)}
.btn-glass{background:rgba(95,134,216,.1);color:var(--peri-pop);border:1.5px solid rgba(95,134,216,.3)}
.btn-glass:hover{background:rgba(95,134,216,.18)}
.btn-full{width:100%}

/* 소개 카테고리 칩 */
.cat-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:8px}
.cat-chip{display:flex;align-items:center;gap:12px;background:#fff;border-radius:18px;padding:14px 16px;box-shadow:var(--shadow-card)}
.cat-dot{width:38px;height:38px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
  font-family:'Space Grotesk';font-weight:700;color:#fff;font-size:.95rem}
.cat-chip .en{font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:.92rem;color:var(--ink-soft)}
.cat-chip .ko{font-weight:800;font-size:.98rem}

/* ===== 체크리스트 ===== */
.namebox{margin-bottom:20px}
.namebox label{display:block;font-weight:800;margin-bottom:8px;font-size:.95rem}
.namebox input{width:100%;border:1.5px solid #d8e89e;border-radius:14px;padding:14px 16px;font-size:1rem;
  font-family:inherit;background:#f7faea;color:var(--ink)}
.namebox input:focus{outline:none;border-color:var(--lime)}

.cat-head{display:flex;align-items:center;gap:12px;margin:26px 4px 14px}
.cat-head .num{width:34px;height:34px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
  font-family:'Space Grotesk';font-weight:700;color:#fff;font-size:.9rem}
.cat-head .en{font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:1.05rem;color:var(--ink-soft)}
.cat-head .ko{font-family:'NanumBarunGothic','나눔바른고딕','Nanum Gothic','Pretendard',sans-serif;font-weight:800;font-size:1.12rem}

.q{background:#fff;border-radius:18px;box-shadow:var(--shadow-card);padding:18px 20px;margin-bottom:12px}
.q-text{font-weight:600;font-size:.98rem;margin-bottom:14px;line-height:1.5}
.q-text .qn{font-family:'Space Grotesk';font-weight:700;color:var(--peri-pop);margin-right:6px}
.scale{display:flex;gap:6px}
.scale button{flex:1;border:1.5px solid #e6ecd4;background:#fbfdf2;border-radius:12px;padding:10px 4px;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:.74rem;color:var(--ink-soft);transition:.15s;line-height:1.25}
.scale button .v{display:block;font-family:'Space Grotesk';font-size:1rem;margin-bottom:2px}
.scale button:hover{border-color:var(--lime)}
.scale button.sel{background:var(--lime);border-color:var(--lime);color:var(--ink)}
.yn{display:flex;gap:10px}
.yn button{flex:1;border:1.5px solid #cdd9ec;background:#f5f8fe;border-radius:12px;padding:12px;cursor:pointer;
  font-family:inherit;font-weight:800;font-size:.95rem;color:var(--ink-soft);transition:.15s}
.yn button:hover{border-color:var(--peri-pop)}
.yn button.sel{background:var(--peri-pop);border-color:var(--peri-pop);color:#fff}

.checklist-foot{position:sticky;bottom:16px;margin-top:24px}
.checklist-foot .btn{box-shadow:0 18px 40px -14px rgba(150,190,40,.55)}

/* ===== 결과 ===== */
.res-empty{text-align:center;color:var(--ink-soft);padding:40px 10px}
.res-date{font-family:'Space Grotesk';font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
.res-date b{display:block;font-size:1.3rem;color:var(--ink);letter-spacing:0;margin-top:4px}
.radar-cap{font-family:'Space Grotesk';font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);text-align:center}
.radar-title{font-family:'NanumBarunGothic','나눔바른고딕','Nanum Gothic','Pretendard',sans-serif;font-weight:800;font-size:1.5rem;text-align:center;margin:6px 0 4px}
.radar-wrap{display:flex;justify-content:center;margin:10px 0}
.radar-note{text-align:center;color:var(--ink-soft);font-size:.85rem;margin-top:6px}

.score-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid #eef3dd}
.score-row:last-child{border-bottom:none}
.score-row .sn{width:32px;height:32px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
  font-family:'Space Grotesk';font-weight:700;font-size:.85rem;color:#fff}
.score-row .lab{flex:1;min-width:0}
.score-row .lab .en{font-family:'Fraunces',serif;font-style:italic;font-weight:600;color:var(--ink-soft);font-size:.92rem}
.score-row .lab .ko{font-weight:800;font-size:.95rem}
.score-row .bar{height:9px;border-radius:999px;background:#edf3d4;margin-top:7px;overflow:hidden}
.score-row .bar i{display:block;height:100%;border-radius:999px;background:var(--grad-bar);width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}
.score-row .pct{font-family:'Space Grotesk';font-weight:700;font-size:1.05rem;min-width:48px;text-align:right;
  background:var(--grad-stat);-webkit-background-clip:text;background-clip:text;color:transparent}

.bg-row{padding:14px 0;border-bottom:1px solid #eef3dd;display:flex;justify-content:space-between;gap:14px;align-items:center}
.bg-row:last-child{border-bottom:none}
.bg-row p{font-size:.92rem;color:var(--ink)}
.bg-row .ans{flex:0 0 auto;font-weight:800;font-size:.85rem;padding:5px 14px;border-radius:999px}
.ans.yes{background:var(--lime);color:var(--ink)}
.ans.no{background:#e7eef9;color:var(--ink-soft)}

.focus-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #eef3dd}
.focus-row:last-child{border-bottom:none}
.focus-row .rk{font-family:'Space Grotesk';font-weight:700;color:var(--ink-soft);width:20px}
.focus-row .en{font-family:'Fraunces',serif;font-style:italic;font-weight:600;color:var(--ink-soft);margin-right:6px}
.focus-row .ko{font-weight:800}
.focus-row .mini{flex:1;height:7px;border-radius:999px;background:#edf3d4;overflow:hidden}
.focus-row .mini i{display:block;height:100%;background:var(--grad-bar)}

.analysis p{color:var(--ink);font-size:1rem;margin-bottom:6px}
.analysis .better{font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:1.15rem;
  color:var(--peri-pop);margin:18px 0 8px}
.quote{background:#f6fadf;border-left:4px solid var(--lime);border-radius:12px;padding:14px 16px;margin-top:16px}
.quote .k{font-family:'Space Grotesk';font-size:.7rem;letter-spacing:.16em;color:#8a9a3a;font-weight:700}
.quote p{font-family:'Fraunces',serif;font-style:italic;font-size:1rem;margin-top:4px}
.oneword{background:#eaf2ff;border-left:4px solid var(--peri-pop);border-radius:12px;padding:14px 16px;margin-top:10px}
.oneword .k{font-family:'Space Grotesk';font-size:.7rem;letter-spacing:.16em;color:var(--peri-pop);font-weight:700}
.oneword p{font-weight:800;font-size:1.05rem;margin-top:4px}

/* 상담사 뷰 */
.admin-link{text-align:center;margin-top:24px}
.admin-link button{background:none;border:none;color:var(--ink-soft);font-size:.82rem;cursor:pointer;text-decoration:underline;opacity:.7}
.admin-panel{display:none;margin-top:16px}
.admin-panel.show{display:block}
.adm-q{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid #eef3dd;font-size:.85rem}

 {c:'Growth', t:'새로운 것을 배우거나 당면한 문제를 해결하는 과정에서 성취감을 느낀다'},

 {c:'Background', t:'최근 1년 이내에 일상의 큰 변화(결혼, 입대, 독립 등)가 있었다', type:'yn'},

 {c:'Background', t:'향후 1년 이내에 장기 해외 체류(여행, 유학, 어학연수 등) 계획이 있다', type:'yn'},

const SCALE_LABELS = ['전혀<br>아니다','아니다','보통','그렇다','매우<br>그렇다'];
const answers = {}; // id -> value (scale 1~5, yn 'Y'/'N')

/* ====== 영역별 조언/문구 ====== */
const ADVICE = {
  Physical:{better:'Better you —', tip:'하루 10분 걷기나 가벼운 스트레칭부터 시작해보세요. 작은 움직임이 몸 전체의 리듬을 바꿔줘요. 수면 시간도 조금씩 일정하게 맞춰보는 것이 큰 도움이 돼요.'},
  Mental:{better:'Better you —', tip:'하루 5분, 지금 느끼는 감정을 한 줄로 적어보세요. 감정에 이름을 붙이는 것만으로도 마음이 한결 정리돼요. 잘 쉬는 것도 연습이 필요하답니다.'},

  Social:{better:'Better you —', tip:'이번 주, 떠오르는 한 사람에게 짧은 안부를 건네보세요. 텍스트보다 목소리 한 번이 관계의 밀도를 바꿔줘요.'},
  Growth:{better:'Better you —', tip:'오늘 해낸 작은 일 하나를 기록해보세요. 성장은 큰 도약이 아니라, 어제보다 나아진 나를 알아차리는 데서 시작돼요.'},

const QUOTES = {
  Physical:['몸이 곧 마음의 집이다.', '— 동양 격언'],
  Mental:['감정은 손님이다. 맞이하되 머물게 두지 마라.', '— Rumi'],

const ONEWORD = {
  high:'균형을 지켜온 당신, 그 꾸준함이 진짜 힘이에요 ✦',

/* ====== 렌더: 소개 카테고리 ====== */
(function(){
  const wrap=document.getElementById('intro-cats');
  RADAR_ORDER.concat(['Background']).forEach(k=>{
    const c=CATS[k];
    const d=document.createElement('div'); d.className='cat-chip';
    d.innerHTML=`<div class="cat-dot" style="background:${c.color}">${k[0]}</div>

    wrap.appendChild(d);
  });

/* ====== 렌더: 체크리스트 ====== */
(function(){
  const body=document.getElementById('check-body');
  let lastCat=null, num=0;
  Q.forEach(q=>{
    if(q.c!==lastCat){
      lastCat=q.c; num++;
      const c=CATS[q.c];
      const h=document.createElement('div'); h.className='cat-head';
      h.innerHTML=`<div class="num" style="background:${c.color}">${String(num).padStart(2,'0')}</div>
        <div><span class="en">${q.c}</span><span class="ko">${c.ko}</span></div>`;
      body.appendChild(h);
    }
    const card=document.createElement('div'); card.className='q'; card.id='q'+q.id;
    let input='';
    if(q.type==='scale'){
      input='<div class="scale">'+SCALE_LABELS.map((l,i)=>
        `<button onclick="answer(${q.id},${i+1},this)"><span class="v">${i+1}</span>${l}</button>`).join('')+'</div>';
    }else{
      input=`<div class="yn">
        <button onclick="answer(${q.id},'Y',this)">예</button>
        <button onclick="answer(${q.id},'N',this)">아니오</button></div>`;
    }
    card.innerHTML=`<div class="q-text"><span class="qn">Q${q.id}</span>${q.t}</div>${input}`;
    body.appendChild(card);
  });
})();

function answer(id,val,btn){
  answers[id]=val;
  const sibs=btn.parentNode.querySelectorAll('button');
  sibs.forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  updateProgress();
}
function updateProgress(){
  const n=Object.keys(answers).length;
  document.getElementById('prog-label').textContent=`${n} / ${Q.length}`;
  document.getElementById('prog-fill').style.width=(n/Q.length*100)+'%';
}

/* ====== 점수 계산 ====== */
function computeScores(){
  const sums={}, counts={};
  RADAR_ORDER.forEach(k=>{sums[k]=0;counts[k]=0;});
  Q.forEach(q=>{
    if(q.type!=='scale') return;
    const v=answers[q.id]; if(!v) return;
    const sc=q.reverse?(6-v):v;
    sums[q.c]+=sc; counts[q.c]++;
  });
  const out={};
  RADAR_ORDER.forEach(k=>{
    out[k]= counts[k]? Math.round(((sums[k]/counts[k])-1)/4*100) : 0; // 1~5 → 0~100
  });
  return out;
}

/* ====== 레이더(오각형) SVG ====== */
function buildRadar(scores){
  const cx=150,cy=150,R=110, n=RADAR_ORDER.length;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/n;return [cx+r*Math.cos(a), cy+r*Math.sin(a)];};
  let grid='';
  [0.25,0.5,0.75,1].forEach(f=>{
    const p=RADAR_ORDER.map((_,i)=>pt(i,R*f).join(',')).join(' ');
    grid+=`<polygon points="${p}" fill="none" stroke="#d7e2cf" stroke-width="1"/>`;
  });
  let axes='';
  RADAR_ORDER.forEach((_,i)=>{const[x,y]=pt(i,R);axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e2e9d8" stroke-width="1"/>`;});
  const poly=RADAR_ORDER.map((k,i)=>pt(i,R*(scores[k]||0)/100).join(',')).join(' ');
  let dots='', labels='';
  RADAR_ORDER.forEach((k,i)=>{
    const[px,py]=pt(i,R*(scores[k]||0)/100); dots+=`<circle cx="${px}" cy="${py}" r="3.5" fill="${CATS[k].color}"/>`;
    const[lx,ly]=pt(i,R+24);
    labels+=`<text x="${lx}" y="${ly-4}" text-anchor="middle" font-family="Fraunces,serif" font-style="italic" font-size="13" fill="${CATS[k].color}">${k}</text>
             <text x="${lx}" y="${ly+13}" text-anchor="middle" font-family="Space Grotesk" font-weight="700" font-size="14" fill="#2b2f2c">${scores[k]||0}</text>`;
  });
  return `<svg width="300" height="300" viewBox="0 0 300 300">${grid}${axes}
    <polygon points="${poly}" fill="rgba(95,134,216,.18)" stroke="#5f86d8" stroke-width="2"/>
    ${dots}${labels}</svg>`;
}

/* ====== 결과 렌더 ====== */
function finishCheck(){
  const n=Object.keys(answers).length;
  if(n<Q.length){
    const miss=Q.find(q=>!answers[q.id]);
    showTab('check');
    const el=document.getElementById('q'+miss.id);
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.animate([{boxShadow:'0 0 0 3px rgba(207,232,79,.9)'},{boxShadow:'var(--shadow-card)'}],{duration:1200});
    alert(`아직 ${Q.length-n}개 문항이 남았어요. (Q${miss.id})`);
    return;
  }
  renderResult();
  submitToSheet();
  showTab('result');
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderResult(){
  const scores=computeScores();
  const name=(document.getElementById('user-name').value||'').trim()||'익명';
  const date=new Date().toISOString().slice(0,10);
  const ranked=[...RADAR_ORDER].sort((a,b)=>scores[a]-scores[b]);
  const lowest=ranked[0];
  const avg=Math.round(RADAR_ORDER.reduce((s,k)=>s+scores[k],0)/RADAR_ORDER.length);

  let intro, tone;
  if(avg>=72){intro='전반적으로 균형이 잘 잡혀 있어요. 지금의 좋은 리듬을 유지하면서, 가장 낮은 영역만 살짝 더 채워보세요.';tone='high';}
  else if(avg>=48){intro='큰 무리 없이 잘 지내고 있어요. 다만 한두 영역이 다른 곳보다 비어 있으니, 그 부분부터 부드럽게 채워봐요.';tone='mid';}
  else{intro='지금 많이 지쳐있거나 균형이 무너진 구간일 수 있어요. 완벽하지 않아도 괜찮아요. 가장 힘든 영역 하나만 먼저 챙겨보는 것으로 시작해보세요 🕊️';tone='low';}

  const adv=ADVICE[lowest], qt=QUOTES[lowest];

  // 영역별 점수
  let scoreRows='';
  RADAR_ORDER.forEach((k,i)=>{
    const c=CATS[k];
    scoreRows+=`<div class="score-row">
      <div class="sn" style="background:${c.color}">${String(i+1).padStart(2,'0')}</div>
      <div class="lab"><span class="en">${k}</span> <span class="ko">${c.ko}</span>
        <div class="bar"><i data-w="${scores[k]}"></i></div></div>
      <div class="pct">${scores[k]}</div></div>`;
  });

  // 배경
  const bgQ=Q.filter(q=>q.c==='Background');
  let bgRows='';
  bgQ.forEach(q=>{
    const a=answers[q.id];
    const yes=a==='Y';
    bgRows+=`<div class="bg-row"><p>${q.t}</p>
      <span class="ans ${yes?'yes':'no'}">${yes?'예':'아니오'}</span></div>`;
  });

  // 집중 영역
  let focusRows='';
  ranked.slice(0,2).forEach((k,i)=>{
    focusRows+=`<div class="focus-row"><span class="rk">${i+1}</span>
      <span><span class="en">${k}</span><span class="ko">${CATS[k].ko}</span></span>
      <span class="mini"><i style="width:${scores[k]}%"></i></span></div>`;
  });

  // 상담사 상세
  let admRows='';
  Q.forEach(q=>{
    const a=answers[q.id];
    const disp = q.type==='yn' ? (a==='Y'?'예':'아니오') : (a||'-');
    admRows+=`<div class="adm-q"><span>Q${q.id}. [${CATS[q.c].ko}] ${q.t}</span><b>${disp}</b></div>`;
  });

  document.getElementById('result-body').innerHTML=`
    <div class="card">
      <div class="res-date">Date<b>${date}</b></div>
      <div style="margin-top:10px;font-weight:800">${escapeHtml(name)} 님의 결과</div>
    </div>

    <div class="card">
      <div class="radar-cap">My Wellness Radar</div>
      <div class="radar-title">웰니스 균형 지도</div>
      <div class="radar-wrap">${buildRadar(scores)}</div>
      <p class="radar-note">각 영역의 점수가 고르게 클수록 안쪽 도형이 정오각형에 가까워져요.</p>
    </div>

    <div class="card">
      <span class="eyebrow">Scores</span>
      <h2 class="kr-sub" style="margin:12px 0 4px">영역별 점수</h2>
      ${scoreRows}
    </div>

    <div class="card">
      <span class="eyebrow">Background &amp; Plans</span>
      <h2 class="kr-sub" style="margin:12px 0 4px">배경 정보 및 계획</h2>
      ${bgRows}
    </div>

    <div class="card">
      <span class="eyebrow">Focus</span>
      <h2 class="kr-sub" style="margin:12px 0 8px">집중이 필요한 영역</h2>
      ${focusRows}
    </div>

    <div class="card analysis">
      <span class="eyebrow">Wellness Analysis</span>
      <p style="margin-top:14px">${intro}</p>
      <p class="better">${adv.better}</p>
      <p>${adv.tip}</p>
      <div class="quote"><div class="k">Quote</div><p>${qt[0]} <span style="font-style:normal;color:var(--ink-soft)">${qt[1]}</span></p></div>
      <div class="oneword"><div class="k">한마디</div><p>${ONEWORD[tone]}</p></div>
    </div>

    <div class="admin-link">
      <button onclick="openPin()">상담사 뷰 (PIN)</button>
    </div>
    <div class="admin-panel card" id="admin-panel">
      <span class="eyebrow">Counselor View</span>
      <h2 class="kr-sub" style="margin:12px 0 8px">전체 응답 상세</h2>
      <div class="adm-q" style="font-weight:800"><span>총점 평균</span><b>${avg}</b></div>
      ${RADAR_ORDER.map(k=>`<div class="adm-q"><span>${CATS[k].ko}</span><b>${scores[k]}</b></div>`).join('')}
      <div style="height:10px"></div>
      ${admRows}
    </div>

    <button class="btn btn-glass btn-full" style="margin-top:18px" onclick="restart()">RESTART · 다시 하기</button>
    <p class="foot-note">이 결과는 자가 점검용 참고 자료예요. 지속적인 어려움이 있다면 전문가의 도움을 받아보세요 <span class="mark">✦</span></p>
  `;
  // 바 애니메이션
  const raf=window.requestAnimationFrame||function(f){return setTimeout(f,16)};
  raf(()=>{document.querySelectorAll('.score-row .bar i').forEach(b=>{b.style.width=b.dataset.w+'%';});});
}

function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

/* ====== 구글시트 전송 ====== */
function submitToSheet(){
  if(!SHEET_ENDPOINT) return;
  const scores=computeScores();
  const avg=Math.round(RADAR_ORDER.reduce((s,k)=>s+scores[k],0)/RADAR_ORDER.length);
  const grade = avg>=80?'매우 좋음':avg>=60?'좋음':avg>=40?'보통':'관리 필요';
  const data={
    name:(document.getElementById('user-name').value||'').trim(),
    date:new Date().toISOString().slice(0,10),
    total:avg, grade:grade
  };
  RADAR_ORDER.forEach(k=>data[k]=scores[k]);
  Q.forEach(q=>{
    let v=answers[q.id];
    if(q.type==='yn') v = (v==='Y'?'예':(v==='N'?'아니오':''));
    data['Q'+q.id]= (v===undefined||v===null)?'':v;
  });
  try{
    fetch(SHEET_ENDPOINT,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams(data).toString()});
  }catch(e){}
}

/* ====== 탭 ====== */
function showTab(name){
  document.body.classList.toggle('hide-top', name==='intro');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
  document.getElementById('panel-'+name).classList.add('show');
}

/* ====== 다시 하기 ====== */
function restart(){
  Object.keys(answers).forEach(k=>delete answers[k]);
  document.querySelectorAll('.scale button,.yn button').forEach(b=>b.classList.remove('sel'));
  document.getElementById('user-name').value='';
  updateProgress();
  document.getElementById('result-body').innerHTML=`<div class="res-empty card">아직 결과가 없어요.<br>체크리스트를 먼저 완료해 주세요 🌱<br><br><button class="btn btn-glass" onclick="showTab('check')">체크리스트로 가기</button></div>`;
  showTab('intro');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ====== PIN ====== */
function openPin(){document.getElementById('pin-modal').classList.add('show');document.getElementById('pin-input').value='';setTimeout(()=>document.getElementById('pin-input').focus(),100);}
function closePin(){document.getElementById('pin-modal').classList.remove('show');}
function checkPin(){
  if(document.getElementById('pin-input').value===ADMIN_PIN){
    closePin();
    document.getElementById('admin-panel').classList.add('show');
    document.getElementById('admin-panel').scrollIntoView({behavior:'smooth',block:'start'});
  }else{ alert('PIN이 올바르지 않아요.'); }
}
document.getElementById('pin-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPin();});
</script>
</body>
